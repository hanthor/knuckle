# GitHub auto-generated release notes config.
# https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes
#
# Groups merged PRs by label into sections in the release body.
# Keep this list short and aligned with the labels used on issues.

changelog:
  exclude:
    labels:
      - ignore-for-release
      - dependencies
    authors:
      - dependabot
      - renovate-bot
  categories:
    - title: Breaking changes
      labels:
        - breaking-change
    - title: Security
      labels:
        - kind/security
    - title: Features
      labels:
        - kind/feature
    - title: Bug fixes
      labels:
        - kind/bug
    - title: Refactors & cleanup
      labels:
        - kind/cleanup
    - title: Tests
      labels:
        - kind/test
    - title: Documentation
      labels:
        - documentation
    - title: CI & infrastructure
      labels:
        - domain:ci
    - title: Other changes
      labels:
        - "*"
