name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write      # cosign keyless OIDC signing
  packages: write      # push to GHCR via oras
  attestations: write  # SLSA provenance

env:
  IMAGE_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release-amd64:
    name: Release (amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: true

      - uses: sigstore/cosign-installer@v3

      - uses: oras-project/setup-oras@v2

      - uses: anchore/sbom-action/download-syft@v0

      - name: Build binary
        run: |
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 \
            go build -ldflags="-s -w -X main.version=${GITHUB_REF_NAME}" \
            -o knuckle-linux-amd64 ./cmd/knuckle
          sha256sum knuckle-linux-amd64 > knuckle-linux-amd64.sha256

      - name: Install ISO dependencies (amd64)
        run: |
          sudo apt-get update
          sudo apt-get install -y xorriso mtools cpio systemd-boot-efi

      - name: Build installer ISO (amd64)
        run: |
          chmod +x ./scripts/build-iso.sh
          ./scripts/build-iso.sh --channel stable --arch amd64 \
            --binary ./knuckle-linux-amd64
          cp output/knuckle-installer-stable-amd64.iso .
          sha256sum knuckle-installer-stable-amd64.iso \
            > knuckle-installer-stable-amd64.iso.sha256

      - name: Generate SBOM (SPDX)
        run: |
          syft knuckle-linux-amd64 \
            --output spdx-json=knuckle-linux-amd64.spdx.json \
            --source-name knuckle \
            --source-version "${GITHUB_REF_NAME}"

      - name: Sign artifacts with cosign (keyless, Sigstore)
        run: |
          cosign sign-blob --yes \
            --bundle knuckle-linux-amd64.bundle \
            knuckle-linux-amd64
          cosign sign-blob --yes \
            --bundle knuckle-installer-stable-amd64.iso.bundle \
            knuckle-installer-stable-amd64.iso
          cosign sign-blob --yes \
            --bundle knuckle-linux-amd64.spdx.json.bundle \
            knuckle-linux-amd64.spdx.json

      - name: Push binary to GHCR and attach SBOM via oras
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "${GHCR_TOKEN}" | oras login ghcr.io -u ${{ github.actor }} --password-stdin

          # Push binary as OCI artifact
          DIGEST=$(oras push \
            --format json \
            "${IMAGE_REGISTRY}/${IMAGE_NAME}/knuckle-linux-amd64:${GITHUB_REF_NAME}" \
            knuckle-linux-amd64:application/octet-stream \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['digest'])")

          # Attach SBOM as referrer
          SBOM_DIGEST=$(oras attach \
            --artifact-type application/vnd.spdx+json \
            --format json \
            "${IMAGE_REGISTRY}/${IMAGE_NAME}/knuckle-linux-amd64@${DIGEST}" \
            knuckle-linux-amd64.spdx.json:application/vnd.spdx+json \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['digest'])")

          # Sign both with cosign
          cosign sign -y "${IMAGE_REGISTRY}/${IMAGE_NAME}/knuckle-linux-amd64@${DIGEST}"
          cosign sign -y "${IMAGE_REGISTRY}/${IMAGE_NAME}/knuckle-linux-amd64@${SBOM_DIGEST}"

      - name: SLSA provenance attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: knuckle-linux-amd64

      - name: Create release and upload amd64 artifacts
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            knuckle-linux-amd64
            knuckle-linux-amd64.sha256
            knuckle-linux-amd64.bundle
            knuckle-linux-amd64.spdx.json
            knuckle-linux-amd64.spdx.json.bundle
            knuckle-installer-stable-amd64.iso
            knuckle-installer-stable-amd64.iso.sha256
            knuckle-installer-stable-amd64.iso.bundle

  release-arm64:
    name: Release (arm64)
    runs-on: ubuntu-24.04-arm
    needs: release-amd64
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: true

      - uses: sigstore/cosign-installer@v3

      - uses: oras-project/setup-oras@v2

      - uses: anchore/sbom-action/download-syft@v0

      - name: Build binary
        run: |
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 \
            go build -ldflags="-s -w -X main.version=${GITHUB_REF_NAME}" \
            -o knuckle-linux-arm64 ./cmd/knuckle
          sha256sum knuckle-linux-arm64 > knuckle-linux-arm64.sha256

      - name: Install ISO dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xorriso mtools cpio systemd-boot-efi

      - name: Build installer ISO (arm64)
        run: |
          chmod +x ./scripts/build-iso.sh
          ./scripts/build-iso.sh --channel stable --arch arm64 \
            --binary ./knuckle-linux-arm64
          cp output/knuckle-installer-stable-arm64.iso .
          sha256sum knuckle-installer-stable-arm64.iso \
            > knuckle-installer-stable-arm64.iso.sha256

      - name: Generate SBOM (SPDX)
        run: |
          syft knuckle-linux-arm64 \
            --output spdx-json=knuckle-linux-arm64.spdx.json \
            --source-name knuckle \
            --source-version "${GITHUB_REF_NAME}"

      - name: Sign artifacts with cosign (keyless, Sigstore)
        run: |
          cosign sign-blob --yes \
            --bundle knuckle-linux-arm64.bundle \
            knuckle-linux-arm64
          cosign sign-blob --yes \
            --bundle knuckle-installer-stable-arm64.iso.bundle \
            knuckle-installer-stable-arm64.iso
          cosign sign-blob --yes \
            --bundle knuckle-linux-arm64.spdx.json.bundle \
            knuckle-linux-arm64.spdx.json

      - name: Push binary to GHCR and attach SBOM via oras
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "${GHCR_TOKEN}" | oras login ghcr.io -u ${{ github.actor }} --password-stdin

          # Push binary as OCI artifact
          DIGEST=$(oras push \
            --format json \
            "${IMAGE_REGISTRY}/${IMAGE_NAME}/knuckle-linux-arm64:${GITHUB_REF_NAME}" \
            knuckle-linux-arm64:application/octet-stream \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['digest'])")

          # Attach SBOM as referrer
          SBOM_DIGEST=$(oras attach \
            --artifact-type application/vnd.spdx+json \
            --format json \
            "${IMAGE_REGISTRY}/${IMAGE_NAME}/knuckle-linux-arm64@${DIGEST}" \
            knuckle-linux-arm64.spdx.json:application/vnd.spdx+json \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['digest'])")

          # Sign both with cosign
          cosign sign -y "${IMAGE_REGISTRY}/${IMAGE_NAME}/knuckle-linux-arm64@${DIGEST}"
          cosign sign -y "${IMAGE_REGISTRY}/${IMAGE_NAME}/knuckle-linux-arm64@${SBOM_DIGEST}"

      - name: SLSA provenance attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: knuckle-linux-arm64

      - name: Upload arm64 artifacts to existing release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          files: |
            knuckle-linux-arm64
            knuckle-linux-arm64.sha256
            knuckle-linux-arm64.bundle
            knuckle-linux-arm64.spdx.json
            knuckle-linux-arm64.spdx.json.bundle
            knuckle-installer-stable-arm64.iso
            knuckle-installer-stable-arm64.iso.sha256
            knuckle-installer-stable-arm64.iso.bundle
