name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write  # required for cosign keyless OIDC signing

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
      # arm64 waits for amd64 to create the release first, avoiding a race
      # on release creation and ensuring generate_release_notes runs exactly once.
      max-parallel: 1
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: true

      - uses: sigstore/cosign-installer@v3

      - name: Build binary
        run: |
          GOOS=linux GOARCH=${{ matrix.arch }} CGO_ENABLED=0 \
            go build -ldflags="-s -w -X main.version=${GITHUB_REF_NAME}" \
            -o knuckle-linux-${{ matrix.arch }} ./cmd/knuckle
          sha256sum knuckle-linux-${{ matrix.arch }} > knuckle-linux-${{ matrix.arch }}.sha256

      - name: Install ISO dependencies
        # LTS is only available for amd64; skip ISO build for arm64+lts (not applicable here
        # since we build stable, but guard is here for future channel matrix expansion).
        run: |
          sudo apt-get update
          sudo apt-get install -y xorriso mtools cpio systemd-boot-efi

      - name: Build installer ISO
        run: |
          chmod +x ./scripts/build-iso.sh
          ./scripts/build-iso.sh --channel stable --arch ${{ matrix.arch }} \
            --binary ./knuckle-linux-${{ matrix.arch }}
          cp output/knuckle-installer-stable-${{ matrix.arch }}.iso .
          sha256sum knuckle-installer-stable-${{ matrix.arch }}.iso \
            > knuckle-installer-stable-${{ matrix.arch }}.iso.sha256

      - name: Sign artifacts with cosign (keyless, Sigstore)
        run: |
          cosign sign-blob --yes \
            --bundle knuckle-linux-${{ matrix.arch }}.bundle \
            knuckle-linux-${{ matrix.arch }}
          cosign sign-blob --yes \
            --bundle knuckle-installer-stable-${{ matrix.arch }}.iso.bundle \
            knuckle-installer-stable-${{ matrix.arch }}.iso

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: ${{ matrix.arch == 'amd64' }}
          files: |
            knuckle-linux-${{ matrix.arch }}
            knuckle-linux-${{ matrix.arch }}.sha256
            knuckle-linux-${{ matrix.arch }}.bundle
            knuckle-installer-stable-${{ matrix.arch }}.iso
            knuckle-installer-stable-${{ matrix.arch }}.iso.sha256
            knuckle-installer-stable-${{ matrix.arch }}.iso.bundle
