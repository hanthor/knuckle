name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write  # required for cosign keyless OIDC signing

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: true

      - uses: sigstore/cosign-installer@v3

      - name: Build binary
        run: |
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 \
            go build -ldflags="-s -w -X main.version=${GITHUB_REF_NAME}" \
            -o knuckle ./cmd/knuckle
          sha256sum knuckle > knuckle.sha256

      - name: Install ISO dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xorriso mtools cpio systemd-boot-efi

      - name: Build installer ISO
        run: |
          chmod +x ./scripts/build-iso.sh
          ./scripts/build-iso.sh --channel stable --binary ./knuckle
          cp output/knuckle-installer-stable.iso .
          sha256sum knuckle-installer-stable.iso > knuckle-installer-stable.iso.sha256

      - name: Sign artifacts with cosign (keyless, Sigstore)
        run: |
          cosign sign-blob --yes \
            --bundle knuckle.bundle \
            knuckle
          cosign sign-blob --yes \
            --bundle knuckle-installer-stable.iso.bundle \
            knuckle-installer-stable.iso

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            knuckle
            knuckle.sha256
            knuckle.bundle
            knuckle-installer-stable.iso
            knuckle-installer-stable.iso.sha256
            knuckle-installer-stable.iso.bundle
