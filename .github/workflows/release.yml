name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Build binary
        run: |
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w" -o knuckle ./cmd/knuckle
          sha256sum knuckle > knuckle.sha256

      - name: Install ISO dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xorriso mtools cpio grub-efi-amd64-bin grub2-common

      - name: Build installer ISO
        run: |
          # build-iso.sh uses EFI shell fallback locally; here we patch it to use grub-mkstandalone
          ./scripts/build-iso-ci.sh
          cp output/knuckle-installer-stable.iso .
          sha256sum knuckle-installer-stable.iso > knuckle-installer-stable.iso.sha256

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            knuckle
            knuckle.sha256
            knuckle-installer-stable.iso
            knuckle-installer-stable.iso.sha256
