name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build + test (-race)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: true

      - name: go mod tidy (must be clean)
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: gofmt (must be clean)
        run: |
          out=$(gofmt -l .)
          if [[ -n "$out" ]]; then
            echo "::error::these files are not gofmt-clean:"; echo "$out"; exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: build
        run: go build ./...

      - name: test -race
        run: go test -race ./...

      - name: flaky test detection
        run: |
          #!/usr/bin/env bash
          set -euo pipefail
          echo "Running tests 5x to detect flaky tests..."
          flaky_detected=0
          for i in {1..5}; do
            echo "Run $i/5..."
            if ! go test -count=1 ./... > /tmp/test_run_$i.log 2>&1; then
              echo "FAIL: Run $i failed"
              flaky_detected=1
              tail -20 /tmp/test_run_$i.log
            fi
          done
          if [[ $flaky_detected -eq 1 ]]; then
            echo "::warning::Potential flaky tests detected — some runs failed. Check logs above."
            exit 0  # Don't fail CI, just warn
          fi
          echo "✓ All 5 runs passed — no flaky tests detected"

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # 2.0.0
        with:
          severity: warning
          scandir: scripts

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  vuln:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: scan
        run: $(go env GOPATH)/bin/govulncheck ./...

  coverage:
    name: coverage gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - uses: extractions/setup-just@v3

      - name: per-package coverage thresholds
        run: just cover-check

      - name: aggregate coverage profile
        run: go test -count=1 -covermode=atomic -coverprofile=cover.out ./...

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-profile
          path: cover.out
          retention-days: 14

      - name: upload coverage to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6
        with:
          files: ./cover.out
          fail_ci_if_error: false

  headless-e2e:
    name: headless e2e (dry-run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: true

      - uses: extractions/setup-just@v3

      - name: headless dry-run
        run: just headless-test

  cross-compile-arm64:
    name: cross-compile arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: true

      - name: build arm64
        run: GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build ./...
