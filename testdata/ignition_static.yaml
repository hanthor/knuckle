variant: flatcar
version: 1.1.0
storage:
  files:
    - path: /etc/hostname
      mode: 0644
      overwrite: true
      contents:
        inline: "flatcar-static"
    - path: /etc/flatcar/update.conf
      mode: 0644
      overwrite: true
      contents:
        inline: |
          REBOOT_STRATEGY=reboot
          GROUP=stable
    - path: /etc/ssh/sshd_config.d/99-knuckle-hardening.conf
      mode: 0600
      overwrite: true
      contents:
        inline: |
          PasswordAuthentication no
          PermitRootLogin no
          PubkeyAuthentication yes
    - path: /etc/systemd/network/10-static.network
      mode: 0644
      contents:
        inline: |
          [Match]
          Name=eth0

          [Network]
          Address=192.168.1.100/24
          Gateway=192.168.1.1
          DNS=8.8.8.8
          DNS=8.8.4.4
systemd:
  units:
    - name: update-engine.service
      enabled: true
passwd:
  users:
    - name: "core"
      ssh_authorized_keys:
        - "ssh-rsa AAAABtest core@host"
